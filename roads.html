/*
  ============================================================
  SECTION 1: TIME UTILITY FUNCTIONS
  ============================================================
  All times in the closure data are stored as integers in
  "HHMM" format: 545 = 5:45 AM, 1130 = 11:30 AM.

  This is simpler than using Date objects for our use case —
  we just need to compare numbers to filter which closures
  are active at any given time.
  ============================================================
*/

/**
 * Convert an HHMM integer to a readable 12-hour string.
 * e.g. 545 → "5:45 AM", 1330 → "1:30 PM"
 */
function fmtTime(hhmm) {
  if (typeof hhmm !== 'number') return String(hhmm);
  const h   = Math.floor(hhmm / 100);      // e.g. 545 → 5
  const m   = hhmm % 100;                  // e.g. 545 → 45
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
}

/**
 * Determine whether a closure is active at a given time.
 *
 * A closure is active if:  closedTime <= currentTime < openTime
 *
 * Special cases:
 *  - FRI_ADV: only show advance closures (phase === 'ADV')
 *  - SUN_KIDS: only show Sunday closures (phase === 'SUN')
 *  - Normal Saturday time: show any closure whose window
 *    includes the selected time, excluding ADV and SUN
 */
function isActive(closure, selectedVal) {
  const { phase, closedHHMM, openHHMM } = closure;

  if (selectedVal === 'FRI_ADV') return phase === 'ADV';
  if (selectedVal === 'SUN_KIDS') return phase === 'SUN';

  // If we're on a normal Saturday time:
  if (phase === 'ADV' || phase === 'SUN') return false;

  const t = parseInt(selectedVal, 10);
  return t >= closedHHMM && t < openHHMM;
}

    from/to    — intersections (for popup display only)
    closedHHMM — time road closes, as HHMM integer
    openHHMM   — time road re-opens, as HHMM integer
    waypoints  — array of [lat, lng] pairs that define the
                 START and END of the segment. These are
                 intersection coordinates looked up from
                 Google Maps. The router will find the
                 actual road path between them.
    notes      — any special access exceptions

    ADV   = Advance (Friday through Saturday)
    EARLY = Race Day Early (3:00–5:00 AM)
    MID   = Race Day Mid (5:00–5:45 AM)
    MAIN  = Race Day Main (5:45 AM+)
    RAMP  = Freeway ramp closures
    SUN   = Sunday Kids Rock
  ============================================================
*/

/*
  ============================================================
  SECTION 4: MAP INITIALIZATION
  ============================================================
  L.map() creates the map and centers it on Nashville.
  The zoom level 13 shows the whole race corridor.

  L.tileLayer() loads the background map imagery from
  OpenStreetMap — completely free, no API key needed.
  {s} = subdomain (a/b/c for load balancing)
  {z}/{x}/{y} = tile coordinates Leaflet fills in automatically
  ============================================================
*/
const map = L.map('map', {
  center: [36.158, -86.784],
  zoom: 13,
  zoomControl: true,
});

// Replaced OSM with CARTO Positron (a much cleaner, local-friendly map)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19,
}).addTo(map);


/*
  ============================================================
  SECTION 5: OSRM ROUTING
  ============================================================
  OSRM (Open Source Routing Machine) is a free, open routing
  engine that runs on OpenStreetMap data. The public demo
  server at router.project-osrm.org accepts requests in this
  format:

    /route/v1/{profile}/{lng,lat};{lng,lat}?geometries=geojson

  Note: OSRM uses longitude FIRST, then latitude — the
  opposite of Leaflet which uses [lat, lng]. Be careful!

  The response includes a GeoJSON LineString geometry that
  follows actual roads. We extract those coordinates and draw
  them as a Leaflet polyline.

  We cache results in routeCache so we don't re-fetch the
  same segment every time the user changes the time slider.
  ============================================================
*/
const routeCache = {};  // key: "lat1,lng1|lat2,lng2" → array of [lat,lng]

// A dedicated bucket just for POI markers
let poiLayers = [];

// A dedicated function that ONLY handles POIs instantly
function togglePOIs() {
  const showPOI = document.getElementById('show-poi').checked;
  
  // Clear existing POIs
  poiLayers.forEach(layer => map.removeLayer(layer));
  poiLayers = [];

  // Draw POIs if checked
  if (showPOI) {
    POI.forEach(poi => {
      const icon = L.divIcon({
        html: `<div style="
          width:13px; height:13px;
          background:${poi.color};
          border:2px solid #fff;
          border-radius:50%;
          box-shadow:0 0 6px rgba(0,0,0,0.6)
        "></div>`,
        iconSize: [13,13], iconAnchor: [6,6], className: ''
      });

      const marker = L.marker([poi.lat, poi.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div class="pu-road">${poi.name}</div>
          <div class="pu-note">${poi.note}</div>
        `);

      poiLayers.push(marker);
    });
  }
}

/**
 * Fetch a road-snapped route between two [lat,lng] points.
 * Returns an array of [lat, lng] coordinates following actual roads.
 * Falls back to a straight line if the API call fails.
 */
async function fetchRoute(waypoints) {
  // Build cache key from all waypoints
  const cacheKey = waypoints.map(w => w.join(',')).join('|');
  if (routeCache[cacheKey]) return routeCache[cacheKey];

  // OSRM wants coordinates as "lng,lat;lng,lat" (note: lon first!)
  const coordStr = waypoints.map(w => `${w[1]},${w[0]}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?geometries=geojson&overview=full`;

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    if (data.code !== 'Ok' || !data.routes.length) throw new Error('No route found');

    // GeoJSON coordinates come back as [lng, lat] — flip to [lat, lng] for Leaflet
    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    routeCache[cacheKey] = coords;
    return coords;

  } catch (err) {
    console.warn(`Routing failed for ${cacheKey}:`, err.message);
    // Fallback: just draw a straight line between the waypoints
    // This won't follow roads but is better than nothing
    routeCache[cacheKey] = waypoints;
    return waypoints;
  }
}


/*
  ============================================================
  SECTION 6: MAP UPDATE LOGIC
  ============================================================
  updateMap() is called whenever the user changes the time
  dropdown or the POI checkbox.

  It:
  1. Removes all currently-drawn polylines and markers
  2. Filters the closures array to only active ones
  3. For each active closure, fetches (or uses cached) road
     geometry from OSRM
  4. Draws a colored polyline for each closure
  5. Draws POI markers if the checkbox is checked
  6. Updates the status bar
  ============================================================
*/
let drawnLayers = [];   // Track everything we've drawn so we can clear it
let isUpdating  = false;

async function updateMap() {
  if (isUpdating) return;  // Prevent overlapping calls
  isUpdating = true;

  const selectedBucket = document.getElementById('time-select').value;

  // Sync the POIs independently before we start drawing roads!
  togglePOIs();

  // Clear previous ROAD layers
  drawnLayers.forEach(layer => map.removeLayer(layer));
  drawnLayers = [];

  // Filter to active closures based on our buckets
  const active = closures.filter(closure => {
    const p = closure.phase || "";
    const opens = closure.openHHMM || 2400; 

    switch (selectedBucket) {
      case 'fri': return p === 'ADV';
      case 'sat_dropoff': return p === 'ADV' || p === 'EARLY' || p === 'MID';
      case 'sat_main': return p !== 'SUN';
      case 'sat_aft': return p !== 'SUN' && opens >= 1300;
      case 'sun': return p === 'SUN';
      default: return true;
    }
  });

  // Update UI Status Bar
  document.getElementById('status-bar').className = active.length ? 'busy' : 'clear';
  document.getElementById('status-bar').textContent =
    active.length
      ? `${active.length} road${active.length !== 1 ? 's' : ''} closed`
      : '✓ No closures at this time';
  document.getElementById('loading-bar').style.display = active.length ? 'block' : 'none';

  // Draw each active closure
  for (const closure of active) {
    const coords = await fetchRoute(closure.waypoints);
    const color  = PHASE_COLORS[closure.phase] || '#ff0000';

    const glowLine = L.polyline(coords, {
      color: color, weight: 9, opacity: 0.25, smoothFactor: 1
    }).addTo(map);

    const mainLine = L.polyline(coords, {
      color: color, weight: 4, opacity: 0.95, smoothFactor: 1
    }).addTo(map);

    const segText = closure.from && closure.to
      ? `<div class="pu-seg">${closure.from} → ${closure.to}</div>` : '';

    let timeText = '';
    if (typeof closure.closedHHMM === 'number' && typeof closure.openHHMM === 'number') {
        timeText = `Closes: <b>${fmtTime(closure.closedHHMM)}</b> &nbsp;|&nbsp; Opens: <b>${fmtTime(closure.openHHMM)}</b>`;
    } else if (closure.phase === 'ADV') {
        timeText = 'Closed: <b>Fri 8:00 AM</b> → <b>Sat 6:00 PM</b>';
    } else {
        timeText = `Phase: <b>${closure.phase}</b>`;
    }

    mainLine.bindPopup(`
      <div class="pu-road">${closure.road}</div>
      ${segText}
      <div class="pu-time">${timeText}</div>
      <div class="pu-phase">${PHASE_LABELS[closure.phase] || closure.phase}</div>
      ${closure.notes ? `<div class="pu-note">⚠ ${closure.notes}</div>` : ''}
    `);

    drawnLayers.push(glowLine, mainLine);
  }

  document.getElementById('loading-bar').style.display = 'none';
  isUpdating = false;
}


/*
  ============================================================
  SECTION 7: MAP LEGEND
  ============================================================
  L.control() creates a custom Leaflet control (UI element).
  position: 'bottomleft' places it in that corner.
  onAdd() returns the HTML element to render.
  ============================================================
*/
/*
  ============================================================
  SECTION 7: MAP LEGEND
  ============================================================
*/
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  
  // 1. Generate the Road Closures phase list automatically
  const phasesHTML = Object.entries(PHASE_LABELS).map(([key, label]) => `
    <div class="leg">
      <div class="leg-line" style="background:${PHASE_COLORS[key] || '#aaa'}"></div>
      ${label}
    </div>
  `).join('');

  // 2. Generate the Key Locations dynamically from our exact POI array
  const poiHTML = POI.map(poi => `
    <div class="leg">
      <div class="leg-dot" style="background:${poi.color}; border:1px solid #fff; box-shadow:0 0 3px rgba(0,0,0,0.5);"></div>
      ${poi.name}
    </div>
  `).join('');

  // 3. Put it all together inside the box
  div.innerHTML = `
    <h4 style="margin: 0 0 8px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8;">Road Closures</h4>
    ${phasesHTML}
    
    <div style="margin-top:12px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
      <h4 style="margin: 0 0 8px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8;">Key Locations</h4>
      ${poiHTML}
    </div>
  `;
  
  // Prevent map clicks/scrolls from passing through the legend box
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  return div;
};
legend.addTo(map);

function downloadCache() {
  // Convert our populated cache object into a text string
  const dataStr = "const routeCache = " + JSON.stringify(routeCache, null, 2) + ";";
  
  // Create a fake downloadable file in the browser
  const blob = new Blob([dataStr], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "my_route_cache.js";
  a.click();
}

/*
  ============================================================
  SECTION 8: FIRST LOAD
  ============================================================
  Call updateMap() once on page load to draw the initial state.
  ============================================================
*/
updateMap();
